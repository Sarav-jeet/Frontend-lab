<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CountDown</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Sekuya&display=swap');
    body{
        width:100% ;
        background-image:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url(lordShiva.jpg)
    }
    .title{
        display: flex;
        flex-direction: column;
        text-align: center;
        font-size: 35px;
        color: white;
        font-family: Sekuya;
        margin-top: 10%;
    }
    .col{
    max-width: 1000px;
    width: 90%;
    height: 100px;
    margin: 10px auto;
    display: flex;
    }
    .col div{
        width: 250px;
        text-align: center;

    }
    input{
        height: 50px;
        width: 50%;
        background-color: rgba(255, 255, 255, 0.5) ;
        border-color: transparent;
        border-radius: 10px;
        text-align: center;
        color: white;
        font-size: 50px;
        
    }
    label{
        color: white;
    }




/* Tablet */
@media (max-width: 992px) {
    .title {
        font-size: 28px;
        margin-top: 15%;
    }

    .col {
        width: 90%;
        gap: 10px;
    }

    .col div {
        width: 25%;
    }

    input {
        width: 80%;
        font-size: 35px;
        height: 45px;
    }

    label {
        font-size: 18px;
    }
}

/* Mobile */
@media (max-width: 768px) {

    .title {
        font-size: 22px;
        margin-top: 20px;
        padding: 0 10px;
    }

    .col {
        width: 100%;
        flex-wrap: wrap;
        justify-content: center;
        height: auto;
        gap: 20px;
    }

    .col div {
        width: 45%;
    }

    input {
        width: 90%;
        height: 45px;
        font-size: 28px;
    }

    label {
        font-size: 16px;
    }
}

/* Small Phones */
@media (max-width: 480px) {

    .title {
        font-size: 18px;
    }

    .col {
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }

    .col div {
        width: 90%;
    }

    input {
        width: 70%;
        height: 40px;
        font-size: 24px;
    }

    label {
        font-size: 14px;
    }
}
    
</style>
<body>
    <div class="text">
        <div class="title">We are coming soon</div>
        <div class="title" id="end-date">st April 2026 10:00pm </div>
        <div class="col">
            <div>
                <input type="text" readonly>
                <br/>
                <label for="">Days</label>
            </div>

           <div>
                <input type="text" readonly>
                <br/> 
                <label for="">Hours</label>
            </div>

           <div>
                <input type="text" readonly>
                <br/>
                <label for="">Minutes</label>
            </div>

            <div>
                <input type="text" readonly>
                <br/>
                <label for="">Seconds</label>
            </div>
        </div>
    </div>

    <script>
        let endDate="17 jun 2026 12:00 am";
        document.querySelector("#end-date").innerText=endDate;


        let input= document.querySelectorAll("input")
        function clock(){
            let end= new Date(endDate);//ye pehle vla time aur date
            let now = new Date();// ye ab ka present date and time  
            let diff= (end - now)/1000 ;
            console.log(diff);
            input[0].value= Math.floor(diff/3600/24); //yeha pe humne jo difference tha end date aur new date ke bich use day m convert kiya hai aur mathfloor ka use karke ek exact value raise karne ka try kiya hai 
            //convert into days
           input[1].value= Math.floor(diff/3600)%24;
           input[2].value=Math.floor(diff/60)%60;
           input[3].value=Math.floor(diff)%60
        }
        clock()

        // 1day= 24hrs
        //1hrs= 60Minutes
        //60minute= 3600secs

        setInterval(() => {
            clock()
        }, 1000);
    </script>
    
</body>
</html>
