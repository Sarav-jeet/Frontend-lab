<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero kata </title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    body{
        background-color: rgb(6, 134, 68);
        text-align: center;
    }
    .container{
        height:70vh ;
        align-content: center;
        
    }

    .game{
        height: 60vmin;
        background-color: darkred;
        width: 60vmin;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 2%;
        margin: auto;
    }
    .box{
        height: 18vmin;
        width: 18vmin;
        border-radius: 20%;
        font-size: 50px;
        background-color: khaki;
    }
    #reset{
        width:30%;
        height: 50px;
        font-size: 25px;
        border-radius: 15%;
        background-color: darkred;
        color: white;
    }
    #newGame{
          width:30%;
        height: 50px;
        font-size: 25px;
        border-radius: 15%;
        background-color: darkred;
        color: white;
    }

    #jeet{
        color: bisque;
        font-size: 50px;
    }
    .hide{
        display: none ;
    }


    /* =========================
   Laptop (1024px and below)
   ========================= */
@media (max-width: 1024px) {
    .game {
        width: 70vmin;
        height: 70vmin;
    }

    .box {
        width: 21vmin;
        height: 21vmin;
        font-size: 45px;
    }

    #reset,
    #newGame {
        width: 40%;
        height: 55px;
        font-size: 22px;
    }

    #jeet {
        font-size: 40px;
    }
}


/* =========================
   Tablet (768px and below)
   ========================= */
@media (max-width: 768px) {
    .container {
        height: 60vh;
    }

    .game {
        width: 80vmin;
        height: 80vmin;
    }

    .box {
        width: 24vmin;
        height: 24vmin;
        font-size: 40px;
    }

    h1 {
        font-size: 2rem;
    }

    #reset,
    #newGame {
        width: 50%;
        height: 50px;
        font-size: 20px;
        border-radius: 12px;
    }

    #jeet {
        font-size: 35px;
    }
}


/* =========================
   Mobile (480px and below)
   ========================= */
@media (max-width: 480px) {
    .container {
        height: 55vh;
    }

    .game {
        width: 90vmin;
        height: 90vmin;
        gap: 1.5%;
    }

    .box {
        width: 28vmin;
        height: 28vmin;
        font-size: 32px;
    }

    h1 {
        font-size: 1.7rem;
        margin-bottom: 10px;
    }

    #reset,
    #newGame {
        width: 70%;
        height: 45px;
        font-size: 18px;
        border-radius: 10px;
    }

    #jeet {
        font-size: 28px;
    }
}
</style>


<body>
    <div class="msg hide">
        <p id="jeet">Winner🏆</p>
    </div>
    <button id="newGame">Start Again</button>
 <h1>Tic Tac Toe</h1>
<div class="container"> 
    <div class="game">
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
    </div>
</div>
<button id="reset">Reset Game</button>


<script>
    let boxes= document.querySelectorAll(".box");
    let resetBtn= document.querySelector("#reset");
    let turnZero=  true;
    let newBtn= document.querySelector("#newGame");
    let msg= document.querySelector(".msg");
    let para= document.querySelector("#jeet");


    const winPattern= [
        [0, 1, 2],
        [0, 3, 6],
        [0, 4, 8],
        [1, 4, 7],
        [2, 5, 8],
        [2, 4, 6],
        [3, 4, 5],
        [6, 7, 8]
    ]
    
    // yaha par humne har ek box ke andar addEventListener laga rakkha hai and uske bhi andar humne yeh kuch conditions apply karvane ki koshish ki hai jisme results alternatively chale aur print ho 
    boxes.forEach((box)=>{
        box.addEventListener("click", ()=> {
            console.log("box was clicked");
            if(turnZero === true){
                box.innerText= "O"; 
                turnZero = false;
            }
            else{
                box.innerText="X";
                turnZero= true
            }
            box.disabled= true; //button ko disable kar diya taaki ek baar click out karne ke baad dubara use access na kiya ja sake
            checkWinner();
        });
    });

       let showWinner= (winner)=>{

        msg.classList.remove("hide");
       }
    const checkWinner = ()=>{
        for(pattern of winPattern){
            let pos1val= boxes[pattern[0]].innerText; //iska matlab "boxes vale arreys" ke andar kis positions par jana hai vo batana 
            let pos2val= boxes[pattern[1]].innerText;
            let pos3val= boxes[pattern[2]].innerText;
            if(pos1val != "" && pos2val != "" && pos3val!="")//yaha par hum ye assure kar rhe hai ki jo humari position 1 hai vo empty ke equal nahi honi chahiye //
            {
                if(pos1val === pos2val && pos2val === pos3val){
                    console.log("Winner🏆" ,pos1val);
                    showWinner(pos1val);
                }
            }
        }    

    }
    
</script>


</body>
</html>
